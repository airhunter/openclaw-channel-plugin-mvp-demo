<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>腾讯TIM最小Demo (ES模块版本)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .container {
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 5px;
        }
        .section {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 5px;
        }
        .section h3 {
            margin-top: 0;
            color: #333;
        }
        input, button {
            padding: 8px;
            margin: 5px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
        button {
            background-color: #007bff;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        #messageList {
            height: 300px;
            overflow-y: auto;
            border: 1px solid #eee;
            padding: 10px;
            background-color: #f9f9f9;
        }
        .message {
            margin: 10px 0;
            padding: 10px;
            background-color: white;
            border-radius: 5px;
        }
        .message.sent {
            background-color: #e3f2fd;
            margin-left: 20%;
        }
        .message.received {
            background-color: #f5f5f5;
            margin-right: 20%;
        }
        .status {
            color: #666;
            font-size: 12px;
        }
        .error {
            color: red;
            background-color: #ffebee;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        .success {
            color: green;
            background-color: #e8f5e9;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>腾讯TIM最小Demo (ES模块版本)</h1>
        
        <!-- SDK加载状态 -->
        <div id="sdkStatus" class="status">SDK加载中...</div>
        
        <!-- 登录部分 -->
        <div class="section">
            <h3>1. 登录</h3>
            <input type="number" id="sdkAppID" placeholder="SDKAppID" value="123456789">
            <input type="text" id="userID" placeholder="用户ID" value="user1">
            <input type="text" id="userSig" placeholder="UserSig" value="">
            <button onclick="login()" id="loginBtn" disabled>登录</button>
            <button onclick="logout()" id="logoutBtn" disabled>退出</button>
            <div class="status" id="loginStatus">未登录</div>
        </div>
        
        <!-- 发送消息部分 -->
        <div class="section">
            <h3>2. 发送消息</h3>
            <input type="text" id="toUserID" placeholder="接收者用户ID" value="user2">
            <input type="text" id="messageContent" placeholder="消息内容" value="Hello World!">
            <button onclick="sendMessage()" id="sendBtn" disabled>发送消息</button>
        </div>
        
        <!-- 消息列表 -->
        <div class="section">
            <h3>3. 消息列表</h3>
            <div id="messageList"></div>
        </div>
    </div>

    <!-- 使用ES模块 -->
    <script type="module">
        let tim = null;
        let currentUser = null;

        // 动态导入SDK
        try {
            const module = await import('https://cdn.jsdelivr.net/npm/@tencentcloud/chat@3.3.5/index.es.js');
            console.log('导入的模块:', module);
            
            // 检查导出的内容
            if (module.default) {
                window.TencentCloudChat = module.default;
            } else if (module.TencentCloudChat) {
                window.TencentCloudChat = module.TencentCloudChat;
            } else {
                // 尝试直接使用整个模块
                window.TencentCloudChat = module;
            }
            
            console.log('TencentCloudChat:', window.TencentCloudChat);
            
            // 更新SDK加载状态
            document.getElementById('sdkStatus').innerHTML = '<span class="success">✓ SDK加载成功</span>';
            document.getElementById('loginBtn').disabled = false;
            console.log('腾讯云IM SDK加载成功');
            
            // 初始化其他函数
            initFunctions();
        } catch (error) {
            console.error('SDK加载失败:', error);
            document.getElementById('sdkStatus').innerHTML = '<span class="error">✗ SDK加载失败: ' + error.message + '</span>';
        }

        // 初始化函数
        function initFunctions() {
            // 登录函数
            window.login = async function() {
                const SDKAppID = parseInt(document.getElementById('sdkAppID').value);
                const userID = document.getElementById('userID').value;
                const userSig = document.getElementById('userSig').value;

                if (!SDKAppID || !userID || !userSig) {
                    alert('请填写完整的登录信息');
                    return;
                }

                try {
                    // 初始化SDK
                    tim = TencentCloudChat.create({
                        SDKAppID: SDKAppID
                    });

                    // 监听SDK事件
                    tim.on(TencentCloudChat.EVENT.SDK_READY, onSDKReady);
                    tim.on(TencentCloudChat.EVENT.MESSAGE_RECEIVED, onMessageReceived);
                    tim.on(TencentCloudChat.EVENT.ERROR, onError);

                    // 登录
                    const loginRes = await tim.login({
                        userID: userID,
                        userSig: userSig
                    });

                    console.log('登录成功:', loginRes);
                    document.getElementById('loginStatus').textContent = `已登录: ${userID}`;
                    document.getElementById('loginStatus').style.color = 'green';
                    currentUser = userID;
                    
                    // 启用按钮
                    document.getElementById('logoutBtn').disabled = false;
                    document.getElementById('sendBtn').disabled = false;
                    
                    alert('登录成功！');
                } catch (error) {
                    console.error('登录失败:', error);
                    document.getElementById('loginStatus').textContent = '登录失败: ' + error.message;
                    document.getElementById('loginStatus').style.color = 'red';
                    alert('登录失败: ' + error.message);
                }
            };

            // 退出登录
            window.logout = async function() {
                if (tim) {
                    try {
                        await tim.logout();
                        document.getElementById('loginStatus').textContent = '未登录';
                        document.getElementById('loginStatus').style.color = '#666';
                        currentUser = null;
                        
                        // 禁用按钮
                        document.getElementById('logoutBtn').disabled = true;
                        document.getElementById('sendBtn').disabled = true;
                        
                        alert('退出成功！');
                    } catch (error) {
                        console.error('退出失败:', error);
                        alert('退出失败: ' + error.message);
                    }
                }
            };

            // 发送消息
            window.sendMessage = async function() {
                if (!tim || !currentUser) {
                    alert('请先登录');
                    return;
                }

                const toUserID = document.getElementById('toUserID').value;
                const content = document.getElementById('messageContent').value;

                if (!toUserID || !content) {
                    alert('请填写接收者和消息内容');
                    return;
                }

                try {
                    // 创建文本消息
                    const message = tim.createTextMessage({
                        to: toUserID,
                        conversationType: TencentCloudChat.TYPES.CONV_C2C,
                        payload: {
                            text: content
                        }
                    });

                    // 发送消息
                    const sendRes = await tim.sendMessage(message);
                    console.log('发送成功:', sendRes);
                    displayMessage(sendRes.data.message, 'sent');
                } catch (error) {
                    console.error('发送失败:', error);
                    alert('发送失败: ' + error.message);
                }
            };
        }

        // SDK准备就绪
        function onSDKReady(event) {
            console.log('SDK准备就绪:', event);
        }

        // 接收消息
        function onMessageReceived(event) {
            console.log('收到消息:', event);
            const messages = event.data;
            messages.forEach(message => {
                displayMessage(message, 'received');
            });
        }

        // 错误处理
        function onError(event) {
            console.error('SDK错误:', event);
            document.getElementById('sdkStatus').innerHTML = '<span class="error">SDK错误: ' + event.data.message + '</span>';
        }

        // 显示消息
        function displayMessage(message, type) {
            const messageList = document.getElementById('messageList');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            const time = new Date(message.time * 1000).toLocaleString();
            const content = message.type === TencentCloudChat.TYPES.MSG_TEXT ? message.payload.text : message.type;
            
            messageDiv.innerHTML = `
                <strong>${message.from}</strong> <span style="color: #999; font-size: 12px;">${time}</span><br>
                ${content}
            `;
            
            messageList.appendChild(messageDiv);
            messageList.scrollTop = messageList.scrollHeight;
        }
    </script>
</body>
</html>
